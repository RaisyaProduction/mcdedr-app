<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC DEDE SYSTEM</title>
    <!-- Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"MC DEDE SYSTEM","short_name":"McDede","start_url":"index.html","display":"standalone","background_color":"%23ffffff","theme_color":"%232563eb","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3061/3061341.png","sizes":"192x192","type":"image/png"}]}'>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 p-4" x-data="app()">

    <!-- LOGIN -->
    <div x-show="!isLoggedIn" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md mt-10">
        <h1 class="text-2xl font-bold text-center mb-4">MC DEDE SYSTEM</h1>
        <button id="btnInstall" class="hidden w-full bg-indigo-600 text-white p-3 rounded mb-4 font-bold">📥 Instal Aplikasi</button>
        <input type="text" x-model="login.user" placeholder="Username" class="w-full border p-2 mb-2 rounded">
        <input type="password" x-model="login.pass" placeholder="Password" class="w-full border p-2 mb-2 rounded">
        <button @click="handleLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
    </div>

    <!-- MAIN APP -->
    <div x-show="isLoggedIn" class="max-w-2xl mx-auto" x-cloak>
        <button @click="isLoggedIn=false" class="bg-red-500 text-white px-4 py-1 rounded mb-4">Logout</button>

        <!-- 1. MASTER SYAIR -->
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="text-xl font-bold mb-4">1. Master Syair</h2>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input x-model="form.nomor" placeholder="Nomor" class="border p-2 rounded">
                <select x-model="form.kat" class="border p-2 rounded"><option>Figur</option><option>Risau</option><option>Nakal</option></select>
                <input x-model="form.arti" placeholder="Arti" class="border p-2 col-span-2 rounded">
            </div>
            <button @click="simpanData()" class="bg-green-600 text-white px-6 py-2 rounded">Simpan Data</button>
        </div>

        <!-- 2. GENERATOR -->
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="text-xl font-bold mb-4">2. Generator BBFS</h2>
            <input x-model="bbfsInput" placeholder="Masukkan 12 angka" class="border p-2 w-full rounded mb-2">
            <button @click="generateBBFS()" class="bg-blue-600 text-white px-6 py-2 rounded">Generate</button>
            <div class="mt-4 p-4 bg-black text-green-400 font-mono rounded h-20 overflow-y-auto" x-text="bbfsHasil"></div>
        </div>

        <!-- 3. TABLE RESULT -->
        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">3. Data Result</h2>
            <table class="w-full text-sm">
                <thead><tr class="bg-gray-200"><th>Nomor</th><th>Arti</th><th>Aksi</th></tr></thead>
                <tbody>
                    <template x-for="(s, index) in daftarSyair" :key="index">
                        <tr class="border-b">
                            <td class="p-2" x-text="s.nomor"></td>
                            <td class="p-2" x-text="s.arti"></td>
                            <td class="p-2"><button @click="hapusData(index)" class="text-red-500">Hapus</button></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // SERVICE WORKER & INSTALASI
        const swBlob = new Blob([`self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(swBlob));
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('btnInstall').style.display = 'block'; });
        document.getElementById('btnInstall').addEventListener('click', () => { deferredPrompt.prompt(); });

        function app() {
            return {
                isLoggedIn: false,
                login: {user:'', pass:''},
                form: {nomor:'', arti:'', kat:'Figur'},
                bbfsInput: '', bbfsHasil: '',
                daftarSyair: JSON.parse(localStorage.getItem('syairList')||'[]'),

                handleLogin() { if(this.login.user=='McDede' && this.login.pass=='002886') this.isLoggedIn=true; else alert('Login Salah!'); },
                simpanData() { this.daftarSyair.push({...this.form}); localStorage.setItem('syairList', JSON.stringify(this.daftarSyair)); this.form={nomor:'', arti:'', kat:'Figur'}; },
                hapusData(i) { this.daftarSyair.splice(i,1); localStorage.setItem('syairList', JSON.stringify(this.daftarSyair)); },
                generateBBFS() { this.bbfsHasil = this.bbfsInput.split('').join('*'); }
            }
        }
    </script>
</body>
</html>
