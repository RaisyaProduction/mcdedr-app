<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <link rel="manifest" href="manifest.json">
    <title>MC DEDE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 p-4" x-data="app()">

    <!-- 1. LOGIN & INSTAL -->
    <div x-show="!isLoggedIn" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md mt-10">
        <div x-show="!lupaMode">
            <h1 class="text-2xl font-bold text-center mb-4">MC DEDE</h1>
            <button id="btnInstall" class="hidden w-full bg-indigo-600 text-white p-3 rounded mb-4 font-bold">📱 Instal Aplikasi ke HP</button>
            <input type="text" x-model="login.user" placeholder="Username" class="w-full border p-2 mb-2 rounded">
            <input type="password" x-model="login.pass" placeholder="Password" class="w-full border p-2 mb-2 rounded">
            <button @click="handleLogin()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
            <p @click="lupaMode = true" class="text-sm text-blue-500 mt-4 cursor-pointer text-center underline">Lupa Password?</p>
        </div>
        <div x-show="lupaMode">
            <h2 class="text-xl font-bold mb-4">Konfirmasi Reset</h2>
            <input type="email" x-model="konf.email" placeholder="Email Terdaftar" class="w-full border p-2 mb-2 rounded">
            <input type="text" x-model="konf.hp" placeholder="No HP Terdaftar" class="w-full border p-2 mb-2 rounded">
            <button @click="cekReset()" class="w-full bg-green-600 text-white p-2 rounded">Konfirmasi & Reset</button>
            <button @click="lupaMode = false" class="w-full bg-gray-400 text-white p-2 rounded mt-2">Batal</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div x-show="isLoggedIn" class="max-w-4xl mx-auto">
        <button @click="isLoggedIn = false" class="bg-red-500 text-white px-4 py-1 rounded mb-4">Logout</button>

        <!-- MENU 1: MASTER SYAIR -->
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="text-xl font-bold mb-4">1. MASTER SYAIR</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-4">
                <input x-model="form.nomor" placeholder="Nomor" class="border p-2 rounded">
                <input x-model="form.arti" placeholder="Arti Syair" class="border p-2 rounded">
                <select x-model="form.kategori" class="border p-2 rounded"><option>Figur</option><option>Risau</option><option>Nakal</option><option>Kotor</option><option>Hukuman</option><option>Kematian</option></select>
            </div>
            <button @click="simpanData()" class="bg-green-600 text-white px-4 py-2 rounded">Simpan Data</button>
        </div>

        <!-- MENU 2: BETON KATEGORI -->
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="text-xl font-bold mb-4">2. BETON KATEGORI</h2>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <select x-model="kat1" class="border p-2 rounded"><option value="">Kat 1</option><option>Figur</option><option>Risau</option><option>Nakal</option><option>Kotor</option><option>Hukuman</option><option>Kematian</option></select>
                <select x-model="kat2" class="border p-2 rounded"><option value="">Kat 2</option><option>Figur</option><option>Risau</option><option>Nakal</option><option>Kotor</option><option>Hukuman</option><option>Kematian</option></select>
                <select x-model="kat3" class="border p-2 rounded"><option value="">Kat 3</option><option>Figur</option><option>Risau</option><option>Nakal</option><option>Kotor</option><option>Hukuman</option><option>Kematian</option></select>
            </div>
            <button @click="generateSemua()" class="bg-purple-600 text-white px-6 py-2 rounded">Generate Gabungan</button>
            <div class="mt-4 p-4 bg-gray-900 text-green-400 font-mono rounded h-32 overflow-y-auto break-all" x-text="hasilBeton.join('*')"></div>
        </div>

        <!-- MENU 3: BBFS & FILTER -->
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="text-xl font-bold mb-4">3. BBFS & FILTER</h2>
            <input x-model="bbfsInput" placeholder="123456789012" class="border p-2 w-full rounded mb-2">
            <button @click="generateBBFS()" class="bg-blue-600 text-white px-6 py-2 rounded">Generate BBFS</button>
            <div class="mt-4 flex flex-wrap gap-2">
                <template x-for="kat in ['Figur','Risau','Nakal','Kotor','Hukuman','Kematian']" :key="kat">
                    <button @click="filterBBFSByKategori(kat)" class="bg-gray-200 px-3 py-1 rounded text-sm" x-text="kat"></button>
                </template>
                <button @click="bbfsHasil = bbfsHasilBackup" class="bg-red-200 px-3 py-1 rounded text-sm">Reset</button>
            </div>
            <div class="mt-2 p-4 bg-gray-900 text-green-400 font-mono rounded h-32 overflow-y-auto break-all" x-text="bbfsHasil.join('*')"></div>
        </div>

        <!-- MENU 4: RESULT MC -->
        <div class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">4. RESULT MC</h2>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input x-model="resultForm.periode" placeholder="Periode" class="border p-2 rounded">
                <select x-model="resultForm.pasar" class="border p-2 rounded"><option>P1</option><option>P2</option><option>P3</option><option>P4</option><option>P5</option><option>P6</option></select>
                <input x-model="resultForm.angka" @input="pecahAngka()" placeholder="4 Angka Result" class="border p-2 rounded col-span-2">
            </div>
            <button @click="simpanResult()" class="bg-green-600 text-white px-6 py-2 rounded mb-4">Simpan Result</button>
            <table class="w-full border-collapse border text-xs text-center">
                <thead><tr class="bg-gray-200"><th>Periode</th><th>Result</th><th>2DD(Arti)</th><th>2DT(Arti)</th><th>2DB(Arti)</th><th>Aksi</th></tr></thead>
                <tbody>
                    <template x-for="(r, i) in daftarResult" :key="i">
                        <tr class="border">
                            <td class="p-1" x-text="r.periode+'/'+r.pasar"></td>
                            <td class="p-1 font-bold" x-text="r.angka"></td>
                            <td class="p-1" x-text="r.d2d+'('+getArti(r.d2d)+')'"></td>
                            <td class="p-1" x-text="r.d2t+'('+getArti(r.d2t)+')'"></td>
                            <td class="p-1" x-text="r.d2b+'('+getArti(r.d2b)+')'"></td>
                            <td class="p-1"><button @click="editResult(i)" class="text-blue-500">Edit</button> | <button @click="hapusResult(i)" class="text-red-500">Hapus</button></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('btnInstall').style.display = 'block'; });
        document.getElementById('btnInstall').addEventListener('click', () => { deferredPrompt.prompt(); });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        function app() {
            return {
                isLoggedIn: false, lupaMode: false, login: {user:'', pass:''}, konf: {email:'', hp:''},
                form: {nomor:'', arti:'', kategori:'Figur'}, daftarSyair: JSON.parse(localStorage.getItem('syairList')||'[]'),
                kat1:'', kat2:'', kat3:'', hasilBeton: [], bbfsInput:'', bbfsHasil:[], bbfsHasilBackup:[],
                resultForm: {periode:'', pasar:'P1', angka:'', d2d:'', d2t:'', d2b:''}, daftarResult: JSON.parse(localStorage.getItem('res')||'[]'),
                
                handleLogin() { if(this.login.user=='McDede' && this.login.pass=='002886') this.isLoggedIn=true; else alert('Login Salah!'); },
                cekReset() { if(this.konf.email=='dede sugionoai@gmail.com' && this.konf.hp=='081220285226') {alert('Password: 002886'); this.lupaMode=false;} },
                simpanData() { this.daftarSyair.push({...this.form}); localStorage.setItem('syairList', JSON.stringify(this.daftarSyair)); this.form.nomor=''; },
                generateSemua() { let d1=this.daftarSyair.filter(i=>i.kategori==this.kat1), d2=this.daftarSyair.filter(i=>i.kategori==this.kat2), d3=this.daftarSyair.filter(i=>i.kategori==this.kat3); let g=new Set(); d1.forEach(a=>{d2.forEach(b=>g.add(a.nomor+b.nomor)); d3.forEach(c=>g.add(a.nomor+c.nomor));}); this.hasilBeton=Array.from(g); },
                generateBBFS() { let d=[...new Set(this.bbfsInput.split('').slice(0,12))]; let res=new Set(); for(let i of d) for(let j of d) for(let k of d) for(let l of d) if(i!=j && i!=k && i!=l && j!=k && j!=l && k!=l) res.add(i+j+k+l); this.bbfsHasilBackup=Array.from(res); this.bbfsHasil=this.bbfsHasilBackup; },
                filterBBFSByKategori(kat) { let target=this.daftarSyair.filter(i=>i.kategori==kat).map(i=>i.nomor); this.bbfsHasil=this.bbfsHasilBackup.filter(n=>target.some(t=>n.startsWith(t))); },
                pecahAngka() { if(this.resultForm.angka.length==4) { this.resultForm.d2d=this.resultForm.angka.substring(0,2); this.resultForm.d2t=this.resultForm.angka.substring(1,3); this.resultForm.d2b=this.resultForm.angka.substring(2,4); } },
                getArti(n) { let f = this.daftarSyair.find(i=>i.nomor==n); return f ? f.arti : '-'; },
                simpanResult() { this.daftarResult.push({...this.resultForm}); localStorage.setItem('res', JSON.stringify(this.daftarResult)); this.resultForm={periode:'', pasar:'P1', angka:'', d2d:'', d2t:'', d2b:''}; },
                editResult(i) { this.resultForm = {...this.daftarResult[i]}; this.daftarResult.splice(i,1); },
                hapusResult(i) { if(confirm('Hapus data?')) { this.daftarResult.splice(i,1); localStorage.setItem('res', JSON.stringify(this.daftarResult)); } }
            }
        }
    </script>
</body>
</html>
